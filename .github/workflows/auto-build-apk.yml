name: Auto-build APK

# Builds a debug APK on every push to dev, independent of the full CI test
# suite (ci.yml) - so you always get a fresh, downloadable APK quickly after
# every commit, even if something unrelated (lint, instrumented tests) is
# failing elsewhere.

on:
  push:
    branches: [dev]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace -DskipFormatKtlint

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: retrotube-latest-apk
          path: app/build/outputs/apk/debug/app-debug.apk
